name: Events Demo 1
on:
  push:
    branches:
      - master
  workflow_dispatch:
  pull_request:
    branches:
      - master
    types:
      - opened
      - edited
      - closed

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Output event data
        run: echo "${{ toJSON(github.event) }}"
      - name: Get code
        uses: actions/checkout@v3
      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-
      - name: Install dependencies
        run: npm ci
      - name: Test code
        run: npm run test
      - name: Build code
        run: npm run build
  build:
    runs-on: ubuntu-latest
    # Define job outputs that other jobs can consume
    outputs:
      artifact-name: ${{ steps.set-output.outputs.artifact-name }}
      build-result: ${{ steps.set-output.outputs.build-result }}
    steps:
      - name: Output event data
        run: echo "${{ toJSON(github.event) }}"
      - name: Get code
        uses: actions/checkout@v3
      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-
      - name: Install dependencies
        run: npm ci
      - name: Test code
        run: npm run test
      - name: Build code
        run: npm run build
      - name: Set job outputs
        id: set-output
        run: |
          echo "artifact-name=build-artifact" >> $GITHUB_OUTPUT
          echo "build-result=success" >> $GITHUB_OUTPUT
      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.set-output.outputs.artifact-name }}
          path: dist
  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Print job outputs from build
        run: |
          echo "Artifact name: ${{ needs.build.outputs.artifact-name }}"
          echo "Build result: ${{ needs.build.outputs.build-result }}"
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact-name }}
      - name: check output
        run: ls -la
      - name: Deploy project
        run: echo "Deploying..."